                </g>
                <g class="animate-fade" style="animation-delay: 1.0s">
                    <text x="0" y="192" text-anchor="middle" fill="#ffffff" opacity="0.8" font-family="'Segoe UI', Ubuntu, sans-serif" font-weight="400" font-size="13px">Jul 12, 2026 - Jul 18, 2026</text>
                </g>
            </g>
        
    </svg>