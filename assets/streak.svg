                </g>
                <g class="animate-fade" style="animation-delay: 0.6s">
                    <text x="0" y="164" text-anchor="middle" fill="#17a24f" font-family="'Segoe UI', Ubuntu, sans-serif" font-weight="600" font-size="15px">Total Contributions</text>
                </g>
                <g class="animate-fade" style="animation-delay: 0.7s">
                    <text x="0" y="192" text-anchor="middle" fill="#ffffff" opacity="0.8" font-family="'Segoe UI', Ubuntu, sans-serif" font-weight="400" font-size="13px">Oct 26, 2023 - Present</text>
                </g>
            </g>

            <g>
                <circle cx="320" cy="120" r="54" fill="none" stroke="#00ff66" stroke-width="6" mask="url(#mask_out_ring_behind_fire)" class="animate-fade" style="animation-delay: 0.4s;" />
                
                <g transform="translate(320, 66)">
                    <g class="animate-fade" style="animation-delay: 0.5s">
                        <path d="M 1.5 0.67 C 1.5 0.67 2.24 3.32 2.24 5.47 C 2.24 7.53 0.89 9.2 -1.17 9.2 C -3.23 9.2 -4.79 7.53 -4.79 5.47 L -4.76 5.11 C -6.78 7.51 -8 10.62 -8 13.99 C -8 18.41 -4.42 22 0 22 C 4.42 22 8 18.41 8 13.99 C 8 8.6 5.41 3.79 1.5 0.67 Z M -0.29 19 C -2.07 19 -3.51 17.6 -3.51 15.86 C -3.51 14.24 -2.46 13.1 -0.7 12.74 C 1.07 12.38 2.9 11.53 3.92 10.16 C 4.31 11.45 4.51 12.81 4.51 14.2 C 4.51 16.85 2.36 19 -0.29 19 Z" 
