                </g>
                
                <text x="320" y="130" text-anchor="middle" fill="#ffffff" font-family="'Segoe UI', Ubuntu, sans-serif" font-weight="700" style="animation: currstreak 0.6s linear forwards">0</text>
                
                <g class="animate-fade" style="animation-delay: 0.7s">
                    <text x="320" y="200" text-anchor="middle" fill="#00ff66" font-family="'Segoe UI', Ubuntu, sans-serif" font-weight="700" font-size="15px">Current Streak</text>
                </g>
                <g class="animate-fade" style="animation-delay: 0.8s">
                    <text x="320" y="228" text-anchor="middle" fill="#ffffff" opacity="0.8" font-family="'Segoe UI', Ubuntu, sans-serif" font-weight="400" font-size="13px">No Active Streak</text>
                </g>
            </g>

            <g transform="translate(533.3333333333334, 0)">
