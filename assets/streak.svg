<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" fill="none">
        <style>
            
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleStreak {
            0% { font-size: 6px; opacity: 0; }
            70% { font-size: 38px; opacity: 1; }
            100% { font-size: 34px; opacity: 1; }
        }
        /* High-performance CSS transform animation scale */
        @keyframes growTrack {
            0% { opacity: 0; transform: scaleX(0); }
            100% { opacity: 1; transform: scaleX(1); }
        }
        .animate-fade {
            opacity: 0;
            animation: fadeIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .title { font: bold 18px "Segoe UI", Ubuntu, sans-serif; fill: #00ff66; }
        .label { font: 600 15px "Segoe UI", Ubuntu, sans-serif; fill: #8b9b90; }
        .value { font: bold 15px "Segoe UI", Ubuntu, sans-serif; fill: #ffffff; }
        .subtext { font: 400 13px "Segoe UI", Ubuntu, sans-serif; fill: #ffffff; }
    
        </style>
        <rect width="100%" height="100%" rx="12" fill="#0b1f13" stroke="#166534" stroke-width="1" />
        
            <style>
                @keyframes currstreak { 
                    0% { font-size: 3px; opacity: 0.2; } 
                    80% { font-size: 42px; opacity: 1; } 
                    100% { font-size: 36px; opacity: 1; } 
                }
            </style>
            
            <defs>
                <mask id="mask_out_ring_behind_fire">
                    <rect width="640" height="300" fill="white" />
                    <circle id="mask-circle" cx="320" cy="66" r="36.5" fill="black" />
                </mask>
